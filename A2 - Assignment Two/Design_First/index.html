<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>ScaleX</title>
</head>
<body>
    <!-- Header -->
    <section id="header">
        <!-- Logo -->
        <div id="logo">
            <img src="./images/logo.jpeg" alt="logo">
            <span style="color: white   ">ScaleX</span>
        </div>

        <!-- Navbar -->
        <div id="navbar">
            <div class="nav"><a href="#">Home</a></div>
            <div class="nav"><a href="#">About Us</a></div>
            <div class="nav"><a href="#">Blogs</a></div>
            <div class="nav"><a href="#">Contact Us</a></div>
        </div>

        <!-- Get Started Button -->
        <div id="get-started">
            <button>Get Started</button>
        </div>
    </section>

    <!-- Mid Part -->
    <section id="mid-part">
        <!-- Name -->
        <div id="name">
            <div id="headline">
                <h1>Insights & Blogs</h1>
            </div>
        </div>

        <!-- Options -->
        <div id="options">
            <div class="option" id="option-active"><a href="#">All</a></div>
            <div class="option"><a href="#">Tech</a></div>
            <div class="option"><a href="#">SaaS</a></div>
            <div class="option"><a href="#">Marketing</a></div>
        </div>
    </section>

    <!-- Bottom Part -->
    <section id="cards">
        <div class="card">
            <!-- Drink Image -->
            <div class="card-image">
                <img src="./images/Drink_with_orange_background.webp" alt="drinks">
            </div>

            <!-- Image Tag -->
            <div class="tag"><span>Tech</span></div>

            <!-- About Image -->
            <div class="about-image">
                <p>The Ultimate Guide to SaaS Marketing</p>
            </div>

            <!-- Date -->
            <div class="date"><p>May 23, 2025</p></div>
        </div>
        <div class="card">
            <!-- Chair Image -->
            <div class="card-image">
                <img src="./images/Chair_with_orange_background.avif" alt="chair">
            </div>
            
            <!-- Image Tag -->
            <div class="tag"><span>SaaS</span></div>
            
            <!-- About Image -->
            <div class="about-image">
                <p>5 Keys Trends In SaaS Growth For 2025</p>
            </div>

            <!-- Date -->
            <div class="date"><p>May 23, 2025</p></div>
        </div>
        <div class="card">
            <!-- Cat Image -->
            <div class="card-image">
                <img src="./images/Cat_with_orange_background.jpg" alt="">
            </div>
            
            <!-- Image Tag -->
            <div class="tag"><span>Marketing</span></div>
            
            <!-- About Image -->
            <div class="about-image">
                <p>How Data-Driven Strategies Are Important</p>
            </div>

            <!-- Date -->
            <div class="date"><p>May 23, 2025</p></div>
        </div>
    </section>
</body>
</html>
