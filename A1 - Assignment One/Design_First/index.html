<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <title>Pikachu</title>
</head>
<body>
    <div id="main">
        <!-- Left Part -->
        <div id="left-part">
            <!-- Pokemon Logo -->
            <div id="pokemon-logo">
                <img src="./images/Pokemon.png" alt="Pokemon">
            </div>

            <h6 class="left-alignment">POKEMON GEN I</h6>

            <h1 class="left-alignment">Pikachu</h1>
            <p class="left-alignment">Pikachu is an Electric-type Pokēmon introduced <br> in Generation I. Pikachu are small, chubby, <br> and incredibly cute mouse-like Pokemon. <br> They are almost completely covered by <br> yellow fur.</p>

            <div id="date">
                <div id="line"></div>
                <p>01 / 08</p>
            </div>

            <div id="pokeball">
                <div id="mid-line"></div>
                <div id="inner-circle"></div>
            </div>
        </div>

    <!-- Right Part -->
        <div id="right-part">
            <!-- Menu Bar -->
            <div id="menu-bar"><img src="./images/menu.svg" alt="menu"></div>

            <div id="pikachu">
                <img src="./images/Pikachu.png" alt="pikachu">
            </div>

            <div id="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
</body>
</html>
